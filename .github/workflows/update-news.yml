name: Update news cache

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scheduled-news-cache
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch and analyze new headlines
        run: npm run update:news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-5.6-luna' }}
          AI_REASONING_EFFORT: low

      - name: Commit changed cache only
        shell: bash
        run: |
          git config user.name "keefes-soiety-news"
          git config user.email "actions@users.noreply.github.com"
          git add data/news-cache.json
          if git diff --cached --quiet; then
            echo "No news cache change to commit."
            exit 0
          fi
          git commit -m "Update scheduled news cache"
          git push
